<title>ORBit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#030308;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;position:fixed;top:0;left:0}


</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
"use strict";
(function(){
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d"),hint=document.getElementById("hint");
var W=0,H=0,TS=0.05,GM=4.0;
function orbV(r,d){return Math.sqrt(GM/(d*TS))*(1+Math.max(0,(14-r)*0.006));}
function idealSpeed(d){return Math.sqrt(GM/d)*Math.sqrt(1/TS);}
var sun={x:0,y:0,vx:0,vy:0,r:28,homeX:0,homeY:0};
var PUCK_R=28;var puck={active:false,x:0,y:0,px:0,py:0};
var STAB=[[40,160,240],[40,200,180],[50,210,120],[180,210,50],[240,180,40],[240,100,40],[220,50,50]];
function stabCol(t){t=Math.min(1,t)*(STAB.length-1);var i=Math.floor(t),f=t-i;if(i>=STAB.length-1)return STAB[STAB.length-1];return l3(STAB[i],STAB[i+1],f);}
function l3(a,b,t){return[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t]}
function rgba(c,a){return"rgba("+~~c[0]+","+~~c[1]+","+~~c[2]+","+a+")"}

var CELL=28,cols=2,rows=2,wH,wV;
function initW(){cols=Math.ceil(W/CELL)+4;rows=Math.ceil(H/CELL)+4;wH=new Float32Array(cols*rows);wV=new Float32Array(cols*rows);}
function disturb(px,py,str){var cx=~~(px/CELL)+1,cy=~~(py/CELL)+1;for(var dy=-4;dy<=4;dy++)for(var dx=-4;dx<=4;dx++){var gx=cx+dx,gy=cy+dy;if(gx<0||gx>=cols||gy<0||gy>=rows)continue;var d=Math.sqrt(dx*dx+dy*dy);if(d>4)continue;wH[gy*cols+gx]+=str*(1-d/4)*(1-d/4);}}
function stepW(){for(var y=1;y<rows-1;y++)for(var x=1;x<cols-1;x++){var i=y*cols+x;wV[i]+=((wH[i-1]+wH[i+1]+wH[i-cols]+wH[i+cols])*0.25-wH[i])*0.3;wV[i]*=0.94;}for(var y=1;y<rows-1;y++)for(var x=1;x<cols-1;x++){var i=y*cols+x;wH[i]+=wV[i];if(wH[i]>5)wH[i]=5;if(wH[i]<-5)wH[i]=-5;}for(var x=0;x<cols;x++){wH[x]=0;wV[x]=0;wH[(rows-1)*cols+x]=0;wV[(rows-1)*cols+x]=0;}for(var y=0;y<rows;y++){wH[y*cols]=0;wV[y*cols]=0;wH[y*cols+cols-1]=0;wV[y*cols+cols-1]=0;}}
function wAt(px,py){var gxf=px/CELL+1,gyf=py/CELL+1,gx=~~gxf,gy=~~gyf;if(gx<0||gx>=cols-1||gy<0||gy>=rows-1)return 0;var fx=gxf-gx,fy=gyf-gy,i=gy*cols+gx;return wH[i]*(1-fx)*(1-fy)+wH[i+1]*fx*(1-fy)+wH[i+cols]*(1-fx)*fy+wH[i+cols+1]*fx*fy;}
function gWarp(px,py){var dx=sun.x-px,dy=sun.y-py,d=Math.sqrt(dx*dx+dy*dy);if(d<15)d=15;var s=3500/(d*d+500),wx=dx/d*s,wy=dy/d*s;if(puck.active){var fdx=puck.x-px,fdy=puck.y-py,fd=Math.sqrt(fdx*fdx+fdy*fdy);if(fd<15)fd=15;var fs=600/(fd*fd+300);wx+=fdx/fd*fs;wy+=fdy/fd*fs;}return{x:wx,y:wy};}
function drawGrid(t){var sh=t*0.0004,sp=22;for(var py=0;py<H;py+=sp){ctx.beginPath();var s=false,wA=0;for(var px=0;px<W;px+=4){var h=wAt(px,py),g=gWarp(px,py);wA=Math.max(wA,Math.abs(h));if(!s){ctx.moveTo(px+g.x,py+h*4+g.y);s=true;}else ctx.lineTo(px+g.x,py+h*4+g.y);}var dS=Math.abs(py-sun.y),sP=Math.max(0,1-dS/(Math.max(W,H)*0.45));ctx.strokeStyle=rgba(stabCol(0.05),Math.min(0.3,0.045+sP*0.06+wA*0.08));ctx.lineWidth=0.55;ctx.stroke();}for(var px=0;px<W;px+=sp){ctx.beginPath();var s=false,wA=0;for(var py2=0;py2<H;py2+=4){var h=wAt(px,py2),g=gWarp(px,py2);wA=Math.max(wA,Math.abs(h));if(!s){ctx.moveTo(px+h*4+g.x,py2+g.y);s=true;}else ctx.lineTo(px+h*4+g.x,py2+g.y);}var dS=Math.abs(px-sun.x),sP=Math.max(0,1-dS/(Math.max(W,H)*0.45));ctx.strokeStyle=rgba(stabCol(0.1),Math.min(0.22,0.035+sP*0.045+wA*0.06));ctx.lineWidth=0.4;ctx.stroke();}}

var stars=[];function initStars(){stars=[];for(var i=0;i<150;i++){var b=Math.random()<0.12;stars.push({x:Math.random()*W,y:Math.random()*H,a:b?0.15+Math.random()*0.25:0.04+Math.random()*0.1,r:b?0.6+Math.random():0.3+Math.random()*0.5,sp:0.0003+Math.random()*0.0015,po:Math.random()*6.28,w:Math.random()});}}
function drawStars(t){for(var i=0;i<stars.length;i++){var s=stars[i];if(s.x>W||s.y>H)continue;var a=s.a*(0.6+Math.sin(t*s.sp+s.po)*0.4);if(a<0.01)continue;ctx.fillStyle="rgba("+(200+~~(s.w*55))+","+(200+~~(s.w*40))+","+(255-~~(s.w*60))+","+a+")";ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();}}
/* === NEBULA === */
var nebulae=[];
function initNebula(){
  nebulae=[];
  // 6 large soft clouds, each a different psychedelic hue
  var hues=[280,200,320,160,240,30]; // violet,cyan,magenta,teal,blue,amber
  for(var i=0;i<6;i++){
    nebulae.push({
      x:Math.random()*W,y:Math.random()*H,
      rx:W*(0.25+Math.random()*0.35),ry:H*(0.2+Math.random()*0.3),
      hue:hues[i],sat:60+Math.random()*30,
      alpha:0.022+Math.random()*0.018,
      angle:Math.random()*6.28,
      driftX:(Math.random()-0.5)*0.0015,driftY:(Math.random()-0.5)*0.0012,
      ph:Math.random()*6.28,breathSp:0.00008+Math.random()*0.00006
    });
  }
  // 3 smaller brighter accent puffs
  for(var i=0;i<3;i++){
    nebulae.push({
      x:Math.random()*W,y:Math.random()*H,
      rx:W*(0.1+Math.random()*0.18),ry:H*(0.08+Math.random()*0.15),
      hue:[340,180,270][i],sat:70,
      alpha:0.03+Math.random()*0.02,
      angle:Math.random()*6.28,
      driftX:(Math.random()-0.5)*0.002,driftY:(Math.random()-0.5)*0.002,
      ph:Math.random()*6.28,breathSp:0.0001+Math.random()*0.00008
    });
  }
}
function drawNebula(t){
  for(var i=0;i<nebulae.length;i++){
    var n=nebulae[i];
    // very slow drift
    n.x+=n.driftX;n.y+=n.driftY;
    if(n.x<-n.rx)n.x=W+n.rx;if(n.x>W+n.rx)n.x=-n.rx;
    if(n.y<-n.ry)n.y=H+n.ry;if(n.y>H+n.ry)n.y=-n.ry;
    // gentle breathing
    var breath=1+Math.sin(t*n.breathSp+n.ph)*0.15;
    var rx=n.rx*breath,ry=n.ry*breath;
    ctx.save();
    ctx.translate(n.x,n.y);ctx.rotate(n.angle);
    // layered radial gradients for soft cloud look
    var g=ctx.createRadialGradient(0,0,0,0,0,Math.max(rx,ry));
    g.addColorStop(0,"hsla("+n.hue+","+n.sat+"%,55%,"+(n.alpha*1.4)+")");
    g.addColorStop(0.35,"hsla("+((n.hue+25)%360)+","+n.sat+"%,45%,"+(n.alpha*0.7)+")");
    g.addColorStop(0.65,"hsla("+((n.hue+50)%360)+","+n.sat+"%,35%,"+(n.alpha*0.3)+")");
    g.addColorStop(1,"hsla("+n.hue+","+n.sat+"%,20%,0)");
    ctx.fillStyle=g;
    ctx.scale(rx/Math.max(rx,ry),ry/Math.max(rx,ry));
    ctx.beginPath();ctx.arc(0,0,Math.max(rx,ry),0,6.28);ctx.fill();
    ctx.restore();
  }
}

/* === GALAXIES === */
var galaxies=[];
function initGalaxies(){
  galaxies=[];
  for(var i=0;i<4;i++){
    galaxies.push({
      x:Math.random()*W, y:Math.random()*H,
      r:40+Math.random()*50,        // overall radius
      angle:Math.random()*6.28,     // tilt
      spin:0.00003+Math.random()*0.00004, // very slow rotation
      arms:2+Math.floor(Math.random()*2), // 2-3 arms
      hue:Math.floor(Math.random()*360),
      alpha:0.06+Math.random()*0.06,
      starCount:40+Math.floor(Math.random()*40),
      stars:[] // populated below
    });
  }
  // pre-generate star positions for each galaxy (polar coords)
  for(var i=0;i<galaxies.length;i++){
    var g=galaxies[i];
    for(var s=0;s<g.starCount;s++){
      var arm=Math.floor(Math.random()*g.arms);
      var t=0.15+Math.random()*0.85; // 0=center 1=edge
      var spread=(1-t)*0.8+0.1;      // tighter near edge
      var baseAng=(arm/g.arms)*6.28 + t*4.5; // spiral sweep
      var jitter=(Math.random()-0.5)*spread*1.5;
      g.stars.push({
        t:t, ang:baseAng+jitter,
        size:Math.random()<0.15?1.2:0.5+Math.random()*0.5,
        brightness:0.5+Math.random()*0.5,
        hueShift:(Math.random()-0.5)*60
      });
    }
  }
}
function drawGalaxies(t){
  for(var i=0;i<galaxies.length;i++){
    var g=galaxies[i];
    g.angle+=g.spin;
    ctx.save();
    ctx.translate(g.x,g.y);
    ctx.rotate(g.angle);
    ctx.scale(1,0.38); // flatten into disc shape

    // soft glow core
    var core=ctx.createRadialGradient(0,0,0,0,0,g.r*0.35);
    core.addColorStop(0,"hsla("+g.hue+",70%,80%,"+(g.alpha*1.2)+")");
    core.addColorStop(0.5,"hsla("+((g.hue+30)%360)+",60%,55%,"+(g.alpha*0.5)+")");
    core.addColorStop(1,"hsla("+g.hue+",50%,30%,0)");
    ctx.fillStyle=core;
    ctx.beginPath();ctx.arc(0,0,g.r*0.35,0,6.28);ctx.fill();

    // dust halo
    var halo=ctx.createRadialGradient(0,0,g.r*0.1,0,0,g.r);
    halo.addColorStop(0,"hsla("+((g.hue+20)%360)+",50%,40%,"+(g.alpha*0.3)+")");
    halo.addColorStop(0.5,"hsla("+g.hue+",40%,25%,"+(g.alpha*0.15)+")");
    halo.addColorStop(1,"hsla("+g.hue+",30%,15%,0)");
    ctx.fillStyle=halo;
    ctx.beginPath();ctx.arc(0,0,g.r,0,6.28);ctx.fill();

    // individual arm stars
    for(var s=0;s<g.stars.length;s++){
      var st=g.stars[s];
      var r2=st.t*g.r;
      var sx=Math.cos(st.ang)*r2,sy=Math.sin(st.ang)*r2;

      ctx.beginPath();ctx.arc(sx,sy,st.size,0,6.28);ctx.fill();
    }

    ctx.restore();
  }
}

var launcher={x:0,y:0,pulling:false,pullX:0,pullY:0,nextR:0,nextPT:0,cooldown:0};

function getLaunchParams(){
  var pdx=launcher.pullX-launcher.x,pdy=launcher.pullY-launcher.y;
  var rawDist=Math.sqrt(pdx*pdx+pdy*pdy);
  var pullDist=Math.min(rawDist,MAX_PULL);
  var pullAng=Math.atan2(pdy,pdx);
  if(pullAng<0.01)pullAng=0.01;if(pullAng>3.13)pullAng=3.13;

  var speed=0.4+power*(MAX_SPEED-0.4);
  return{pullDist:pullDist,pullAng:pullAng,launchAng:launchAng,power:power,speed:speed,
    orbX:launcher.x+Math.cos(pullAng)*pullDist,orbY:launcher.y+Math.sin(pullAng)*pullDist,
    vx:Math.cos(launchAng)*speed,vy:Math.sin(launchAng)*speed};

function simulateTraj(sx,sy,vx,vy,steps){
  var pts=[{x:sx,y:sy}];var x=sx,y=sy,tvx=vx,tvy=vy;
  for(var i=0;i<steps;i++){

    pts.push({x:x,y:y});
  }
  return pts;
}

function drawLauncher(t){
  var lx=launcher.x,ly=launcher.y;
  // cradle
  ctx.strokeStyle="rgba(180,220,255,0.15)";ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(lx,ly,20,Math.PI,2*Math.PI);ctx.stroke();
  for(var a=-90;a<=90;a+=22){var rad=(a-90)*Math.PI/180;ctx.strokeStyle="rgba(180,220,255,0.06)";ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(lx+Math.cos(rad)*24,ly+Math.sin(rad)*24);ctx.lineTo(lx+Math.cos(rad)*30,ly+Math.sin(rad)*30);ctx.stroke();}

  if(launcher.cooldown>0)return;

  var pr=launcher.nextR;
  var previewX=lx,previewY=ly-pr-6;

  if(launcher.pulling){
    var lp=getLaunchParams();
    previewX=lp.orbX;previewY=lp.orbY;
    var power=lp.power;

    // elastic line base to orb
    ctx.strokeStyle=rgba([120,180,255],0.12+power*0.12);ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(previewX,previewY);ctx.stroke();

    // LEADER LINE — simulated trajectory, brighter and longer with more power
    var numPts=Math.floor(15+power*50);
    var traj=simulateTraj(lx,ly-pr-6,lp.vx,lp.vy,numPts);
    if(traj.length>2){
      // draw solid fading line
      for(var i=1;i<traj.length;i++){
        var fade=1-(i/traj.length);
        var alpha=fade*fade*(0.15+power*0.35);
        if(alpha<0.01)continue;

        ctx.lineWidth=1.2*fade+0.3;
        ctx.beginPath();
        ctx.moveTo(traj[i-1].x,traj[i-1].y);
        ctx.lineTo(traj[i].x,traj[i].y);

    var pg2=ctx.createRadialGradient(lx,ly,0,lx,ly,LAUNCH_ZONE_R);

    ctx.fillStyle=pg2;ctx.beginPath();ctx.arc(lx,ly,LAUNCH_ZONE_R,0,6.28);ctx.fill();

    ctx.fillStyle='rgba(255,200,80,'+(0.4+pulse*0.3)+')';
    ctx.fillText(nn+'/3',lx,ly-LAUNCH_ZONE_R+6);
    ctx.textAlign='left';ctx.textBaseline='top';
  }

  // preview planet

  var tintC=[pc[0]*pt.surfTint[0],pc[1]*pt.surfTint[1],pc[2]*pt.surfTint[2]];
  var mg=ctx.createRadialGradient(previewX-pr*0.2,previewY-pr*0.2,0,previewX,previewY,pr);

}

;ctx.fill();}}var hl=ctx.createRadialGradient(lx*0.8,ly*0.8,0,lx*0.5,ly*0.5,r*0.55);hl.addColorStop(0,rgba([255,255,250],0.14*li+g*0.07));hl.addColorStop(0.3,rgba([255,250,240],0.05*li));hl.addColorStop(1,"rgba(255,245,230,0)");ctx.fillStyle=hl;ctx.beginPath();ctx.ellipse(0,0,rx,ry,0,0,6.28);ctx.fill();if(pt.hasAtmo&&pt.atmoC){var ag=ctx.createRadialGradient(0,0,r*0.85,0,0,r*1.05);ag.addColorStop(0,rgba(pt.atmoC,0));ag.addColorStop(0.5,rgba(pt.atmoC,0.06*li));ag.addColorStop(1,rgba(pt.atmoC,0.02));ctx.fillStyle=ag;ctx.beginPath();ctx.ellipse(0,0,rx,ry,0,0,6.28);ctx.fill();}var rimX=-snx*r*0.55,rimY=-sny*r*0.55;var rim=ctx.createRadialGradient(rimX,rimY,r*0.55,rimX,rimY,r*1.15);rim.addColorStop(0,rgba(baseC,0.07*li));rim.addColorStop(1,rgba(baseC,0));ctx.fillStyle=rim;ctx.beginPath();ctx.ellipse(0,0,rx,ry,0,0,6.28);ctx.fill();ctx.restore();var la=Math.atan2(sny,snx);ctx.strokeStyle=rgba(l3(baseC,[255,240,220],0.2*li),0.3+g*0.15);ctx.lineWidth=0.9;ctx.beginPath();ctx.arc(o.x,o.y,rx,la-1.57,la+1.57);ctx.stroke();ctx.strokeStyle=rgba(baseC,0.08+g*0.04);ctx.lineWidth=0.5;ctx.beginPath();ctx.arc(o.x,o.y,rx,la+1.57,la+4.71);ctx.stroke();if(pt.hasAtmo&&pt.atmoC){ctx.strokeStyle=rgba(pt.atmoC,0.08*li);ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(o.x,o.y,rx+1.5,la-1.2,la+1.2);ctx.stroke();}if(pt.hasRing){ctx.save();ctx.translate(o.x,o.y);ctx.scale(1,o.ringTilt);ctx.strokeStyle=rgba(baseC,0.2+g*0.1);ctx.lineWidth=r*0.12;ctx.beginPath();ctx.arc(0,0,r*1.7,0,Math.PI);ctx.stroke();ctx.strokeStyle=rgba(l3(baseC,[255,255,255],0.3),0.12);ctx.lineWidth=r*0.06;ctx.beginPath();ctx.arc(0,0,r*1.95,0,Math.PI);ctx.stroke();ctx.restore();}}

function applyPuck(){if(!puck.active)return;var pvx=puck.x-puck.px,pvy=puck.y-puck.py,pSpd=Math.sqrt(pvx*pvx+pvy*pvy);var sdx=sun.x-puck.x,sdy=sun.y-puck.y,sd=Math.sqrt(sdx*sdx+sdy*sdy),sMin=sun.r+PUCK_R;if(sd<sMin&&sd>0.1){var nx=sdx/sd,ny=sdy/sd;sun.x=puck.x+nx*sMin*1.005;sun.y=puck.y+ny*sMin*1.005;var blend=Math.min(0.25,pSpd*0.04);sun.vx+=(pvx*nx*nx-sun.vx*0.1)*blend;sun.vy+=(pvy*ny*ny-sun.vy*0.1)*blend;disturb(puck.x,puck.y,pSpd*0.04+0.3);try{if(navigator.vibrate)navigator.vibrate(6);}catch(e){}}for(var i=0;i<orbs.length;i++){var o=orbs[i];if(o.dead)continue;var dx=o.x-puck.x,dy=o.y-puck.y,d=Math.sqrt(dx*dx+dy*dy),md=o.baseR+PUCK_R;if(d<md&&d>0.1){var nx=dx/d,ny=dy/d;o.x=puck.x+nx*md*1.01;o.y=puck.y+ny*md*1.01;var impact=Math.max(0,pvx*nx+pvy*ny);var sS=Math.min(0.6,impact*0.3+pSpd*0.04);o.vx=o.vx*(1-sS)+nx*(impact*0.6+pSpd*0.2)*sS;o.vy=o.vy*(1-sS)+ny*(impact*0.6+pSpd*0.2)*sS;o.squishX+=nx*nx*0.1-ny*ny*0.04;o.squishY+=ny*ny*0.1-nx*nx*0.04;o.glow=Math.min(1,o.glow+0.15);o.idleTime=0;disturb(puck.x+nx*PUCK_R,puck.y+ny*PUCK_R,pSpd*0.03+0.3);try{if(navigator.vibrate)navigator.vibrate(6);}catch(e){}}}}
function applyG(){for(var i=0;i<orbs.length;i++){if(orbs[i].dead)continue;for(var j=i+1;j<orbs.length;j++){if(orbs[j].dead)continue;var a=orbs[i],b=orbs[j];var dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy);var ms=a.baseR+b.baseR+5;if(d<ms&&d>0.1){var rp=0.02*(ms-d)/ms;var nx=dx/d,ny=dy/d;a.vx-=nx*rp;a.vy-=ny*rp;b.vx+=nx*rp;b.vy+=ny*rp;continue;}if(d>180)continue;var f=Math.min(0.00015*a.mass*b.mass/(d*d),0.002);var nx=dx/d,ny=dy/d;a.vx+=nx*f/a.mass;a.vy+=ny*f/a.mass;b.vx-=nx*f/b.mass;b.vy-=ny*f/b.mass;}}}
function collide(){for(var p=0;p<3;p++){for(var i=0;i<orbs.length;i++){if(orbs[i].dead)continue;for(var j=i+1;j<orbs.length;j++){if(orbs[j].dead)continue;var a=orbs[i],b=orbs[j];var dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy),mn=a.baseR+b.baseR;if(d>=mn||d<0.1)continue;var nx=dx/d,ny=dy/d,ov=mn-d,tm=a.mass+b.mass;a.x-=nx*ov*(b.mass/tm)*0.55;a.y-=ny*ov*(b.mass/tm)*0.55;b.x+=nx*ov*(a.mass/tm)*0.55;b.y+=ny*ov*(a.mass/tm)*0.55;if(p===0){var dvx=a.vx-b.vx,dvy=a.vy-b.vy,dot=dvx*nx+dvy*ny;if(dot>0){var imp=dot/tm*0.12;a.vx-=imp*b.mass*nx;a.vy-=imp*b.mass*ny;b.vx+=imp*a.mass*nx;b.vy+=imp*a.mass*ny;a.glow=Math.min(1,a.glow+0.2);b.glow=Math.min(1,b.glow+0.2);disturb((a.x+b.x)/2,(a.y+b.y)/2,0.6);try{if(navigator.vibrate)navigator.vibrate(4);}catch(e){}}}}}}}

var rings=[];function addRing(x,y,s){rings.push({x:x,y:y,rad:0,mx:55+s*75,life:1,spd:0.5+s*0.3})}

var dragN=0;
function gXY(e){var t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY}}
function inLZ(p){return Math.sqrt((p.x-launcher.x)**2+(p.y-launcher.y)**2)<LAUNCH_ZONE_R&&launcher.cooldown<=0;}
function onD(e){e.preventDefault();var p=gXY(e);if(inLZ(p)){launcher.pulling=true;launcher.pullX=p.x;launcher.pullY=p.y;}else{puck.active=true;puck.x=p.x;puck.y=p.y;puck.px=p.x;puck.py=p.y;disturb(p.x,p.y,1.8);addRing(p.x,p.y,0.6);}}
function onM(e){e.preventDefault();var p=gXY(e);if(launcher.pulling){launcher.pullX=p.x;launcher.pullY=p.y;return;}if(!puck.active)return;puck.px=puck.x;puck.py=puck.y;puck.x=p.x;puck.y=p.y;var spd=Math.sqrt((puck.x-puck.px)**2+(puck.y-puck.py)**2);disturb(puck.x,puck.y,0.3+spd*0.015);dragN++;if(dragN%12===0)addRing(puck.x,puck.y,0.08+spd*0.005);}
function onU(e){e.preventDefault();if(launcher.pulling){launchPlanet();launcher.pulling=false;return;}if(puck.active){disturb(puck.x,puck.y,1.2);addRing(puck.x,puck.y,0.4);}puck.active=false;dragN=0;}
canvas.addEventListener("touchstart",onD,{passive:false});canvas.addEventListener("touchmove",onM,{passive:false});canvas.addEventListener("touchend",onU,{passive:false});
canvas.addEventListener("mousedown",onD,false);canvas.addEventListener("mousemove",function(e){if(puck.active||launcher.pulling)onM(e);},false);canvas.addEventListener("mouseup",onU,false);

function resize(){W=window.innerWidth;H=window.innerHeight;sun.homeX=W/2;sun.homeY=H/2;canvas.width=W;canvas.height=H;canvas.style.width=W+"px";canvas.style.height=H+"px";initW();if(stars.length===0){initStars();initNebula();initGalaxies();}launcher.x=W/2;launcher.y=H-120;if(orbs.length===0){sun.x=W/2;sun.y=H/2;initOrbs();queueNext();}}
window.addEventListener("resize",resize);


/* === SCORING === */
var score=0;
var scoreOrbit=0;   // progress 0..1 toward next +1
var scorePenalty=0; // flash timer for -10

// How long (ms) one full orbit-tick takes based on orb count
function orbitPeriod(n){
  if(n<3) return Infinity;
  // 3 orbs = 10000ms, 10 orbs = 3000ms, linear interpolation clamped
  var ms=10000-(n-3)*(7000/7);
  return Math.max(2000,ms);
}

function liveOrbCount(){
  var c=0;for(var i=0;i<orbs.length;i++)if(!orbs[i].dead)c++;return c;
}

function updateScore(dt){
  var n=liveOrbCount();
  var period=orbitPeriod(n);
  if(period===Infinity){scoreOrbit=0;return;}
  scoreOrbit+=dt/period;
  if(scoreOrbit>=1){scoreOrbit-=1;score++;}
}

function drawOrbIcon(cx,cy,r,alpha){
  // small glowing circle icon representing an orb
  ctx.strokeStyle="rgba(100,200,255,"+alpha+")";ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx,cy,r,0,6.28);ctx.stroke();
  ctx.fillStyle="rgba(100,200,255,"+(alpha*0.25)+")";
  ctx.beginPath();ctx.arc(cx,cy,r,0,6.28);ctx.fill();
  // tiny dot center
  ctx.fillStyle="rgba(180,230,255,"+alpha+")";
  ctx.beginPath();ctx.arc(cx,cy,1.2,0,6.28);ctx.fill();
}

function drawScore(t){
  var n=liveOrbCount();
  var isNeg=score<0;
  var isWaiting=(n<3);
  var period=orbitPeriod(n);
  var progress=period===Infinity?0:scoreOrbit;

  ctx.save();
  ctx.textAlign="left";ctx.textBaseline="top";

  // --- SCORE NUMBER ---
  var px=16,py=20;
  var scoreStr=(score>0?"+":"")+score;
  var scoreColor=isNeg?"rgba(240,80,80,0.92)":"rgba(255,255,255,0.88)";
  if(scorePenalty>0){scorePenalty-=0.016;scoreColor="rgba(255,50,50,1)";}
  ctx.font="bold 30px system-ui,sans-serif";
  ctx.fillStyle=scoreColor;
  ctx.fillText(scoreStr,px,py);

  // --- PROGRESS BAR — compact, just below score ---
  var barX=px,barY=py+34,barW=100,barH=3;
  // track
  ctx.fillStyle="rgba(255,255,255,0.08)";
  ctx.beginPath();ctx.roundRect(barX,barY,barW,barH,2);ctx.fill();
  // fill
  if(!isWaiting&&progress>0){
    var barFill=progress*barW;
    var fc=isNeg?"rgba(240,80,80,0.7)":"rgba(100,200,255,0.7)";
    ctx.fillStyle=fc;
    ctx.beginPath();ctx.roundRect(barX,barY,barFill,barH,2);ctx.fill();
  }
  // waiting pulse on bar
  if(isWaiting){
    var pulse=0.3+Math.sin(t*0.003)*0.2;
    ctx.fillStyle="rgba(255,200,80,"+pulse+")";
    ctx.beginPath();ctx.roundRect(barX,barY,barW,barH,2);ctx.fill();
  }

  // --- ORB COUNT with icon, right of progress bar ---
  var orbX=barX+barW+10,orbY=barY+barH/2;
  drawOrbIcon(orbX+5,orbY,4.5,isWaiting?0.3:0.55);
  ctx.font="12px system-ui,sans-serif";
  ctx.textBaseline="middle";
  ctx.fillStyle=isWaiting?"rgba(255,200,80,0.5)":"rgba(255,255,255,0.4)";
  ctx.fillText("x"+n,orbX+14,orbY);



  ctx.restore();
}


function drawLogo(){
  ctx.save();
  ctx.textAlign="right";ctx.textBaseline="top";
  ctx.font="bold 17px system-ui,sans-serif";
  // measure to position pieces
  var itW=ctx.measureText("it").width;
  var orbW=ctx.measureText("ORB").width;
  var tx=W-14,ty=18;

  // icon sits left of text
  var cx=tx-orbW-itW-12,cy=ty+9;
  var s=0.62;

  // rings
  ctx.strokeStyle="rgba(30,70,110,0.65)";ctx.lineWidth=0.8;
  ctx.beginPath();ctx.arc(cx,cy,23*s,0,6.28);ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,15*s,0,6.28);ctx.stroke();
  ctx.strokeStyle="rgba(40,80,130,0.65)";
  ctx.beginPath();ctx.arc(cx,cy,8*s,0,6.28);ctx.stroke();

  // sun
  var sg=ctx.createRadialGradient(cx-1.5*s,cy-1.5*s,0,cx,cy,8*s);
  sg.addColorStop(0,"rgba(255,248,220,0.95)");sg.addColorStop(0.4,"rgba(255,200,80,0.9)");sg.addColorStop(1,"rgba(255,140,30,0.7)");
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(cx,cy,4.5*s,0,6.28);ctx.fill();

  // planets
  ctx.fillStyle="rgba(50,150,255,0.85)";ctx.beginPath();ctx.arc(cx,cy-8.5*s,2.8*s,0,6.28);ctx.fill();
  ctx.fillStyle="rgba(30,200,120,0.85)";ctx.beginPath();ctx.arc(cx+10*s,cy-10*s,3.2*s,0,6.28);ctx.fill();
  ctx.fillStyle="rgba(180,60,255,0.85)";ctx.beginPath();ctx.arc(cx-14*s,cy-17*s,2.5*s,0,6.28);ctx.fill();

  // ORBit text — draw right-aligned so 'it' ends at tx
  ctx.fillStyle="rgba(200,80,255,0.85)";
  ctx.fillText("it",tx,ty);
  ctx.fillStyle="rgba(255,255,255,0.72)";
  ctx.fillText("ORB",tx-itW,ty);

  ctx.restore();
}

var lastT=0,time=0,sunPulsed=false;
function frame(now){requestAnimationFrame(frame);if(lastT===0){lastT=now;return;}var dt=Math.min(now-lastT,40);lastT=now;time+=dt;if(launcher.cooldown>0)launcher.cooldown-=dt;if(!sunPulsed&&time>1000){sunPulsed=true;for(var _i=0;_i<3;_i++){(function(delay){setTimeout(function(){addRing(sun.x,sun.y,1.5+delay*0.5);},delay*400);}(_i));}}ctx.fillStyle="#030308";ctx.fillRect(0,0,W,H);drawNebula(time);drawGalaxies(time);drawStars(time);stepW();drawGrid(time);updateSun(dt);drawSun(time);for(var i=0;i<orbs.length;i++)drawTrail(orbs[i]);for(var i=rings.length-1;i>=0;i--){var r=rings[i];r.rad+=r.spd*dt*0.028;r.life=Math.max(0,1-r.rad/r.mx);if(r.life<=0){rings.splice(i,1);continue;}ctx.strokeStyle=rgba(stabCol(0.05),r.life*0.22);ctx.lineWidth=0.7*r.life;ctx.beginPath();ctx.arc(r.x,r.y,r.rad,0,6.28);ctx.stroke();}updateScore(dt);applyPuck();applyG();collide();for(var i=0;i<orbs.length;i++){updateOrb(orbs[i],dt);drawOrb(orbs[i]);}drawPuck();drawLauncher(time);drawScore(time);drawLogo();}
resize();requestAnimationFrame(frame);
})();
